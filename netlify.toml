[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[dev]
  command     = "npm run dev"
  port        = 8888
  targetPort  = 5173

# Proxy /api/* to Netlify Functions during dev and in production
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — all unmatched routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
