[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command     = "npm run dev"
  port        = 8888
  targetPort  = 5173

# Proxy /api/* to Netlify Functions (dev and production)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
